# CaiBao QQ Bot 适配器配置
# ============================

# ------------------------------------------------------------------
# CaiBao 后端连接
# ------------------------------------------------------------------
[caibao]
# CaiBao API 地址
base_url = "http://127.0.0.1:8000"

# Bot 专用账号（需要在 CaiBao 中注册）
# 所有 QQ 用户共用此 Bot 账号，通过 conversation_id 隔离会话
bot_user_id = "qqbot"
bot_password = "change-me-before-use"

# HTTP 请求超时（秒）
http_timeout = 120.0


# ------------------------------------------------------------------
# NapCat / OneBot v11 WebSocket 通道
# 填 enable=true 启用，留空跳过
# 安全：必须显式设置 allow_all=true 或填写 allow_from 白名单
# ------------------------------------------------------------------
[channels.napcat]
enabled = false
# WebSocket 地址（NapCat 默认 ws://127.0.0.1:3001）
ws_url = "ws://127.0.0.1:3001"
# NapCat access_token（如果配置了的话）
access_token = ""
# 私聊白名单（QQ 号列表），allow_all=true 时忽略
allow_from = []
# 显式允许所有私聊（安全风险！仅开发环境使用）
allow_all = false
# WebSocket 自动重连
reconnect = true


# ------------------------------------------------------------------
# 群聊配置（可选，每个群一条）
# ------------------------------------------------------------------
# [[channels.napcat.groups]]
# group_id = "123456789"
# allow_from = ["10001", "10002"]   # 群成员白名单
# require_at = true                  # 需要 @ 机器人才回复
# allow_proactive = false            # 是否允许主动推送


# ------------------------------------------------------------------
# QQ 官方 Bot 通道（可选，与 NapCat 并存）
# 通过 WebSocket 接收消息 + HTTP API 发送
# 填 app_id 启用，留空跳过
# ------------------------------------------------------------------
[channels.qqbot]
enabled = false
app_id = ""
client_secret = ""
# 允许的用户 OpenID 列表（私聊），allow_all=true 时忽略
allow_from = []
# 显式允许所有私聊（安全风险！仅开发环境使用）
allow_all = false
# WebSocket 自动重连
reconnect = true
# 群聊配置（可选，每个群一条）
# [[channels.qqbot.groups]]
# group_openid = "GROUP_OPENID"
# allow_from = ["MEMBER_OPENID"]


# ------------------------------------------------------------------
# 消息行为
# ------------------------------------------------------------------
[message]
# 流式输出时，每累积多少字符发送一条 QQ 消息
streaming_flush_chars = 300
# 单条 QQ 消息最大字符数
max_message_chars = 3500
# 是否需要在 QQ 消息中显示 RAG 来源引用
show_sources = true
